<!DOCTYPE html>
<html>
  <head>
    <title>
      For Sale
    </title>
    <style>
      body{
        display: flex;
        flex-direction: row;
        justify-content: space-evenly;
        row-gap: 10px;
      }
      .main{
        width: 300px;
        height: 300px;
        position: relative;
      }
      img{
        width: 300px;
        height: 300px;
        object-fit: cover;
      }
      .ad{
        position: absolute;
        background-color: black;
        color: white;
        padding: 6px;
        font-size: 12px;
        font-family: arial;
        right: 0;
        top: 8px;
      }
      .button{
        position: absolute;
        right: 100px;
        bottom: 60px;
      }
      button{
        padding: 8px;
        font-family: arial;
        border-width: 2px;
        border-style: solid;
      }
      .diff{
        position: absolute;
        bottom: 0;
        left: 0;
        height: 100px;
        width: 300px;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: rgba(216, 209, 209, 0.5);
      }
    </style>
  </head>
  <body>
    <div class="main">
      <div class="ad">20% OFF</div>
      <img src="/HTML/images/dragon-ball.jpg" alt="">
    </div>
    <div class="main">
      <div class="ad">20% OFF</div>
      <img src="/HTML/images/dragon-ball.jpg" alt="">
      <div class="diff">
      <button>
        Add to Cart
      </button>
    </div>
    </div>
  </body>
</html>
