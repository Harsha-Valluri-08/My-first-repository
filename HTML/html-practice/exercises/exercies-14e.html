<!DOCTYPE html>
<html>
  <head>
    <title>Position practice</title>
    <style>
      .main-container{
        display: flex;
        justify-content: space-around;
        position: fixed;
        top: 2px;
        left: 10px;
        right: 10px;
        border-radius: 10px;
        width: 100%;
        align-items: center;
        border: none;
        background-color: rgba(240, 248, 255, 0.658);
        box-shadow: 0px 0px 4px rgba(0,0,0,0.8);
      }
      .image{
        height: 40px;
        width: 40px;
        border-radius:20px;
      }
      .but{
        background-color: rgb(11, 141, 192);
        color: white;
        border: none;
        padding-left: 12px;
        padding-right: 12px;
        padding-top: 6px;
        padding-bottom: 6px;
        border-radius: 5px;
        font-weight: bold;
      }
      .butt{
        padding-left: 12px;
        padding-right: 12px;
        padding-top: 6px;
        padding-bottom: 6px;
        border-radius: 5px;
        font-weight: bold;
        border: none;
        color: black;
      }
      .sub{
        display: flex;
        gap: 7px;
      }
      p{
        font-family: arial;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="main-container">
      <div class="sub">
      <img class="image" src="/HTML/images/html-logo.png" alt="It is a image">
      <p>Oliver</p>
    </div>
      <div class="buttons">
        <button class="but">Add Friend</button>
        <button class="butt">Message</button>
      </div>
    </div>
  </body>
</html>
